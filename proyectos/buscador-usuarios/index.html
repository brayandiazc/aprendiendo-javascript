<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscador de usuarios</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 36rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      h1 { margin-bottom: 0.25rem; }
      #buscador {
        width: 100%;
        padding: 0.6rem;
        font-size: 1rem;
        box-sizing: border-box;
        margin: 0.5rem 0;
      }
      #estado { color: #666; font-size: 0.9rem; }
      ul { list-style: none; padding: 0; }
      li {
        padding: 0.6rem 0;
        border-bottom: 1px solid #eee;
      }
      span { color: #555; }
    </style>
  </head>
  <body>
    <h1>Buscador de usuarios</h1>
    <p>Datos en vivo desde una API pública. Escribe para filtrar por nombre.</p>

    <input id="buscador" type="search" placeholder="Buscar por nombre…" />
    <p id="estado"></p>
    <ul id="lista"></ul>

    <script src="app.js"></script>
  </body>
</html>
