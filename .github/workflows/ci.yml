name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown lint y enlaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

      - name: Revisar enlaces
        uses: lycheeverse/lychee-action@v2
        with:
          # Las exclusiones (_sidebar.md y la URL de Pages) están en lychee.toml,
          # que lychee detecta automáticamente en la raíz del repo.
          args: "--no-progress './**/*.md'"
          fail: true

  ejemplos:
    name: Sintaxis de ejemplos JS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Verificar sintaxis de los ejemplos (.js / .mjs)
        run: |
          shopt -s globstar nullglob
          fail=0
          for f in **/*.js **/*.mjs; do
            node --check "$f" || fail=1
          done
          exit $fail

  ejecutar:
    name: Ejecutar soluciones
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      # Ejecuta de verdad las soluciones de los ejercicios y falla si alguna rompe.
      # Estas no dependen de la red, así que son deterministas.
      - name: Ejecutar soluciones (offline)
        run: |
          set -e
          for f in \
            soluciones/07-poo.js \
            soluciones/09-asincronia.js \
            soluciones/11-manejo-de-errores.js \
            soluciones/13-strings-numeros-fechas.js \
            soluciones/12-modulos-es/main.mjs; do
            echo "▶ $f"
            node "$f"
          done

      # La solución de fetch consume una API pública: depende de la red, así que
      # es best-effort (no bloquea el CI si la API no responde).
      - name: Ejecutar solución con red (best-effort)
        continue-on-error: true
        run: |
          echo "▶ soluciones/10-fetch-y-apis.js (requiere red)"
          node soluciones/10-fetch-y-apis.js
