name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown lint y enlaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

      - name: Revisar enlaces
        uses: lycheeverse/lychee-action@v2
        with:
          # Excluimos _sidebar.md (navegación de docsify con enlaces raíz-relativos
          # que lychee no resuelve) y la propia URL de GitHub Pages (chequeo circular
          # e intermitente durante los redespliegues).
          args: "--no-progress --exclude-path ./_sidebar.md --exclude brayandiazc.github.io './**/*.md'"
          fail: true

  ejemplos:
    name: Sintaxis de ejemplos JS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Verificar sintaxis de los ejemplos (.js / .mjs)
        run: |
          shopt -s globstar nullglob
          fail=0
          for f in **/*.js **/*.mjs; do
            node --check "$f" || fail=1
          done
          exit $fail
