# Configuración de Dependabot.
# Este repo es de contenido y no tiene dependencias de runtime; solo vigilamos
# las acciones de GitHub usadas en los workflows de CI.
# Documentación: https://docs.github.com/code-security/dependabot/dependabot-version-updates

version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci-cd"
    commit-message:
      prefix: "chore"
      include: "scope"
